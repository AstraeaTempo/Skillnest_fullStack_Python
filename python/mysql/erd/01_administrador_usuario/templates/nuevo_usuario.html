<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario</title>
    <link rel="stylesheet" href="../static/css/nuevo_usuario.css">
</head>
<body>

    <main class="main-container">
        <section class="form-container">
            <h2>Nuevo Usuario</h2>
            
            <form id="form-nuevo-usuario" action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="conf-password">Conf. Contraseña</label>
                    <input type="password" id="conf-password" name="conf-password" required>
                </div>

                <div class="form-group">
                    <label for="tipo-usuario">Tipo de Usuario</label>
                    <div class="select-wrapper">
                        <select id="tipo-usuario" name="tipo-usuario" required>
                            <option value="Administrador">Administrador</option>
                            <option value="Usuario">Usuario</option>
                        </select>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-crear">Crear</button>
                </div>
            </form>
        </section>
    </main>

    <script src="../static/js/nuevo_usuario.js"></script>
</body>
</html>
